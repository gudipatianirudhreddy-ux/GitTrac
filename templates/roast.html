<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your GitHub Roast - GitTrac</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .roast-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 40px;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .roast-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
        }

        .roast-content {
            font-size: 1.1rem;
            line-height: 1.8;
            font-style: italic;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .username-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        .btn-group-roast {
            margin-top: 30px;
            text-align: center;
        }

        .btn-group-roast .btn {
            margin: 5px;
        }
    </style>
</head>

<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-3" href="{{ url_for('home') }}">
                GitTrac
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5 mb-5">
        <!-- Back Button -->
        <div class="mb-4">
            <a href="{{ url_for('home') }}" class="btn btn-outline-secondary">
                ← Back to Home
            </a>
        </div>

        <!-- Roast Container -->
        <div class="roast-container">
            <div class="username-badge">
                🔥 Roasting @{{ username }}
            </div>

            <h1 class="roast-title">
                Your GitHub Roast 🎭
            </h1>

            <div class="roast-content">
                {{ roast }}
            </div>

            <div class="btn-group-roast">
                <a href="{{ url_for('home') }}" class="btn btn-light btn-lg">
                    Get Another Profile
                </a>
                <button onclick="copyToClipboard()" class="btn btn-outline-light btn-lg">
                    📋 Copy Roast
                </button>
            </div>
        </div>

        <!-- Disclaimer -->
        <div class="alert alert-info mt-5" role="alert">
            <strong>⚠️ Fun Note:</strong> This roast is generated by AI and meant for entertainment purposes only. No developers were harmed in the making of this roast! 😄
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function copyToClipboard() {
            const roastText = document.querySelector('.roast-content').innerText;
            navigator.clipboard.writeText(roastText).then(function () {
                alert('Roast copied to clipboard!');
            }).catch(function (err) {
                console.error('Failed to copy: ', err);
                alert('Failed to copy roast');
            });
        }
    </script>
</body>

</html>
