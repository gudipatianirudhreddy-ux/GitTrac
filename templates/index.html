<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitTrac</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="header-inner container-fluid px-4 px-md-5">
                <a class="brand" href="#">GitTrac</a>
                <nav class="site-nav">
                    <a class="nav-link" href="#dashboard">Dashboard</a>
                </nav>
            </div>
        </header>

        <main class="hero-section">
            <div class="container content-grid">
                <section class="hero-copy">
                    <p class="eyebrow">Developer tools for GitHub profiles</p>
                    <h1>Analyze Any GitHub Profile</h1>
                    <p class="hero-copy__subtitle">Get repository analytics, language insights, and AI-powered feedback in seconds.</p>

                    <form method="POST" class="hero-form" novalidate>
                        <label class="visually-hidden" for="username">GitHub username</label>
                        <div class="input-group">
                            <input id="username" name="username" type="text" placeholder="Enter GitHub username" required>
                            <button type="submit">Analyze Profile</button>
                        </div>
                    </form>

                    {% if error_message %}
                    <div class="alert alert-danger mt-4" role="alert">
                        {{ error_message }}
                    </div>
                    {% endif %}

                    <div class="feature-badges" aria-label="Feature highlights">
                        <span>📊 Repository Analytics</span>
                        <span>💻 Language Insights</span>
                        <span>🔥 AI Roast</span>
                        <span>⚡ Real-Time Data</span>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
